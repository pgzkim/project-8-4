<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@12/swiper-bundle.min.css" />
    <title>Document</title>
</head>

<body>

    <!-- Slider main container -->
    <div class="swiper">
        <h2 class="title">РЕМОНТ ТЕХНИКИ РАЗЛИЧНЫХ БРЕНДОВ</h2>
        <!-- Additional required wrapper -->
        <div class="swiper-wrapper">
            <!-- Slides -->
            <div class="swiper-slide">
                <div class="swiper-slide__card">
                    <img class="brand-logo" src="/ic/lenovo.svg" alt="lenovo">
                    <img class="arrow" src="/ic/go.svg" alt="arrow">
                </div>
            </div>
            <div class="swiper-slide">
                <div class="swiper-slide__card">
                    <img class="brand-logo" src="/ic/samsung.svg" alt="samsung">
                    <img class="arrow" src="/ic/go.svg" alt="arrow">

                </div>
            </div>
            <div class="swiper-slide">
                <div class="swiper-slide__card">
                    <img class="brand-logo apple" src="/ic/apple.svg" alt="apple">
                    <img class="arrow" src="/ic/go.svg" alt="arrow">
                </div>
            </div>
            <div class="swiper-slide">
                <div class="swiper-slide__card">
                    <img class="brand-logo" src="/ic/sonic.svg" alt="vsonic">
                    <img class="arrow" src="/ic/go.svg" alt="arrow">

                </div>
            </div>
            <div class="swiper-slide">
                <div class="swiper-slide__card">
                    <img class="brand-logo" src="/ic/bosch.svg" alt="bosch">
                    <img class="arrow" src="/ic/go.svg" alt="arrow">
                </div>
            </div>
            <div class="swiper-slide">
                <div class="swiper-slide__card">
                    <img class="brand-logo" src="/ic/hp.svg" alt="hp">
                    <img class="arrow" src="/ic/go.svg" alt="arrow">
                </div>
            </div>
            <div class="swiper-slide hiddenacer">
                <div class="swiper-slide__card">
                    <img class="brand-logo acer" src="/ic/acer.svg" alt="acer">
                    <img class="arrow" src="/ic/go.svg" alt="arrow">
                </div>
            </div>
            <div class="swiper-slide hiddensony">
                <div class="swiper-slide__card">
                    <img class="brand-logo" src="/ic/Bitmap.svg" alt="sony">
                    <img class="arrow" src="/ic/go.svg" alt="arrow">
                </div>
            </div>

            <div class="swiper-slide hidden">
                <div class="swiper-slide__card">
                    <img class="brand-logo" src="/ic/lenovo.svg" alt="lenovo">
                    <img class="arrow" src="/ic/go.svg" alt="arrow">
                </div>
            </div>
            <div class="swiper-slide hidden">
                <div class="swiper-slide__card">
                    <img class="brand-logo" src="/ic/samsung.svg" alt="samsung">
                    <img class="arrow" src="/ic/go.svg" alt="arrow">

                </div>
            </div>
            <div class="swiper-slide hidden">
                <div class="swiper-slide__card">
                    <img class="brand-logo apple" src="/ic/apple.svg" alt="apple">
                    <img class="arrow" src="/ic/go.svg" alt="arrow">
                </div>
            </div>
            
        </div>
        <div class="swiper-pagination"></div>
        <button class="show-all">
            <img class="" src="/ic/icon.svg" alt="">
            <span>Показать все</span>
        </button>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/swiper@12/swiper-bundle.min.js"></script>
    <script src="script.js">
    </script>
</body>

</html>
